---
services:
  postgres:
    image: postgres:16
    container_name: stock_postgres
    restart: always
    ports:
      - "0.0.0.0:5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock_db
    volumes:
      - stock_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  stock_pgdata:
